<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resonance Signal</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080810; --surface: #0e0e1a; --surface2: #13131f; --border: rgba(255,255,255,0.06);
            --border-bright: rgba(255,255,255,0.12); --text: #e8e6f0; --text-2: #7a7890; --text-3: #3a3850;
            --accent: #7b6cff; --accent-2: #ff6b6b; --accent-3: #4ecdc4; --accent-4: #ffd93d; --accent-5: #6bcb77;
            --hot: #ff6b6b; --warm: #ffd93d; --cool: #4ecdc4; --cold: #7b6cff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Syne', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; line-height: 1.5; }
        
        /* Navigation */
        nav { position: fixed; top: 0; left: 0; right: 0; z-index: 8000; display: flex; align-items: center; justify-content: space-between; padding: 16px 40px; background: rgba(8,8,16,0.85); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }
        .nav-logo { display: flex; align-items: center; gap: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; }
        .nav-logo span { color: var(--accent); }
        .nav-right { display: flex; gap: 24px; font-family: 'DM Mono', monospace; font-size: 0.65rem; text-transform: uppercase; }
        .nav-link { cursor: pointer; color: var(--text-3); transition: 0.2s; }
        .nav-link:hover { color: var(--text); }

        /* Hero */
        .hero { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 120px 40px; text-align: center; position: relative; }
        .hero-title { font-size: clamp(3rem, 8vw, 6.5rem); font-weight: 800; line-height: 0.92; margin-bottom: 28px; }
        .hero-title span { display: block; }
        .hero-title .outline { color: transparent; -webkit-text-stroke: 1px rgba(123,108,255,0.4); }
        .hero-title .accent { color: var(--accent); }

        /* Sections */
        section { padding: 80px 40px; max-width: 1200px; margin: 0 auto; }
        .section-tag { font-family: 'DM Mono', monospace; font-size: 0.6rem; color: var(--accent); text-transform: uppercase; margin-bottom: 12px; }
        .section-title { font-size: 2.5rem; font-weight: 700; margin-bottom: 40px; letter-spacing: -0.02em; }

        /* Map Layout */
        .map-layout { display: grid; grid-template-columns: 1fr 320px; gap: 30px; }
        .map-container { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; position: relative; overflow: hidden; }
        canvas { width: 100%; height: 450px; display: block; background: radial-gradient(circle at center, #131325 0%, #080810 100%); }
        
        .sidebar-card { background: var(--surface); border: 1px solid var(--border); padding: 24px; border-radius: 12px; }
        .genre-bar-row { margin-bottom: 12px; }
        .genre-bar-top { display: flex; justify-content: space-between; font-size: 0.8rem; margin-bottom: 4px; }
        .genre-bar-track { height: 4px; background: rgba(255,255,255,0.05); border-radius: 2px; }
        .genre-bar-fill { height: 100%; border-radius: 2px; transition: width 1s ease-out; }

        /* Tables & Grids */
        .gap-chart-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
        .gap-row { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; padding: 16px 20px; border-bottom: 1px solid var(--border); align-items: center; }
        .signal-pill { font-family: 'DM Mono', monospace; font-size: 0.6rem; padding: 4px 10px; border-radius: 20px; text-align: center; width: fit-content; }
        .signal-pill.aligned { background: rgba(107,203,119,0.1); color: var(--accent-5); }
        .signal-pill.dj-play { background: rgba(78,205,196,0.1); color: var(--accent-3); }

        .emerging-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .emerging-table th { text-align: left; padding: 12px; font-family: 'DM Mono'; font-size: 0.6rem; color: var(--text-3); text-transform: uppercase; border-bottom: 1px solid var(--border); }
        .emerging-table td { padding: 16px 12px; border-bottom: 1px solid var(--border); font-size: 0.85rem; }

        /* Animations */
        .reveal { opacity: 0; transform: translateY(30px); transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .reveal.in { opacity: 1; transform: translateY(0); }
    </style>
</head>
<body>

<nav>
    <div class="nav-logo">RESONANCE <span>SIGNAL</span></div>
    <div class="nav-right">
        <div class="nav-link" onclick="window.scrollTo(0, 800)">Intelligence</div>
        <div class="nav-link" onclick="window.scrollTo(0, 1600)">Signals</div>
    </div>
</nav>

<div class="hero">
    <div class="hero-eyebrow">2026 Global Intelligence</div>
    <h1 class="hero-title">
        <span>WHERE MUSIC</span>
        <span class="outline">MOVES BEFORE</span>
        <span class="accent">IT CHARTS</span>
    </h1>
</div>

<section id="map-section">
    <div class="section-tag reveal">Market Heatmap</div>
    <h2 class="section-title reveal">Global Node Network</h2>
    <div class="map-layout">
        <div class="map-container reveal">
            <canvas id="world-map"></canvas>
        </div>
        <div class="map-sidebar reveal">
            <div class="sidebar-card">
                <div class="section-tag">Market Focus</div>
                <h3 id="sel-country" style="margin-bottom: 4px;">Loading...</h3>
                <p id="sel-country-sub" style="font-family:'DM Mono'; font-size: 0.6rem; color: var(--text-3); margin-bottom: 20px;">Fetching global telemetry</p>
                <div id="sel-genre-bars"></div>
            </div>
        </div>
    </div>
</section>

<section id="gap-section">
    <div class="section-tag reveal">Signal Analysis</div>
    <h2 class="section-title reveal">Artist Market Gaps</h2>
    <div class="gap-chart-wrap reveal">
        <div id="gap-rows"></div>
    </div>
</section>

<section id="emerging-section">
    <h2 class="section-title reveal">Emerging Underground</h2>
    <table class="emerging-table reveal">
        <thead>
            <tr><th>Artist</th><th>Track</th><th>Label</th><th>Market</th></tr>
        </thead>
        <tbody id="emerging-tbody"></tbody>
    </table>
</section>

<script>
let COUNTRIES = [];

// Fixed Data Loading with Relative Paths
async function loadData() {
    try {
        const base = './data/';
        const [gap, vel, geo, em, countries, signals] = await Promise.all([
            fetch(base + 'gap.json').then(r => r.json()),
            fetch(base + 'velocity.json').then(r => r.json()),
            fetch(base + 'geo.json').then(r => r.json()),
            fetch(base + 'emerging.json').then(r => r.json()),
            fetch(base + 'countries.json').then(r => r.json()),
            fetch(base + 'signals.json').then(r => r.json()),
        ]);
        
        COUNTRIES = countries;
        renderUI({ gap, em, countries });
        _startMapCanvas();
        initReveal();
    } catch (e) {
        console.error("Data error:", e);
        // Fallback for UI so it's not empty if fetch fails
        document.getElementById('sel-country').textContent = "Connection Error";
    }
}

function renderUI(data) {
    // Gap Rows
    document.getElementById('gap-rows').innerHTML = data.gap.slice(0,8).map(r => `
        <div class="gap-row">
            <div><div style="font-weight:600">${r.artist}</div><div style="font-size:0.6rem; color:var(--text-3)">${r.genre}</div></div>
            <div style="font-family:'DM Mono'">${r.playRank || '—'}</div>
            <div style="font-family:'DM Mono'">${r.buyRank || '—'}</div>
            <div class="signal-pill ${r.signal}">${r.signal.toUpperCase()}</div>
        </div>`).join('');

    // Emerging Table
    document.getElementById('emerging-tbody').innerHTML = data.em.slice(0,8).map(t => `
        <tr>
            <td><b>${t.artist}</b></td>
            <td style="color:var(--text-2)">${t.title}</td>
            <td style="font-family:'DM Mono'; font-size:0.65rem">${t.label}</td>
            <td><span class="signal-pill aligned">${t.market}</span></td>
        </tr>`).join('');

    if (data.countries.length > 0) updateSidebar(data.countries[0]);
}

function updateSidebar(c) {
    document.getElementById('sel-country').textContent = c.name;
    document.getElementById('sel-country-sub').textContent = `${c.sets} SETS ANALYZED`;
    document.getElementById('sel-genre-bars').innerHTML = c.genres.map(g => `
        <div class="genre-bar-row">
            <div class="genre-bar-top"><span>${g.n}</span><span>${g.v}%</span></div>
            <div class="genre-bar-track"><div class="genre-bar-fill" style="width:${g.v}%; background:${g.c}"></div></div>
        </div>`).join('');
}

function _startMapCanvas() {
    const canvas = document.getElementById('world-map');
    const ctx = canvas.getContext('2d');
    let W, H, dpr;

    // Pulse nodes
    const REGIONS = [
        { name: 'USA', code: 'US', x: 0.2, y: 0.35, r: 25, c: '#ffd93d' },
        { name: 'Europe', code: 'DE', x: 0.5, y: 0.28, r: 30, c: '#ff6b6b' },
        { name: 'South Africa', code: 'ZA', x: 0.55, y: 0.75, r: 18, c: '#7b6cff' },
        { name: 'Australia', code: 'AU', x: 0.85, y: 0.7, r: 22, c: '#4ecdc4' }
    ];

    function resize() {
        W = canvas.offsetWidth;
        H = canvas.offsetHeight;
        dpr = window.devicePixelRatio || 1;
        canvas.width = W * dpr;
        canvas.height = H * dpr;
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function draw(ts) {
        ctx.clearRect(0, 0, W, H);
        const t = ts / 1000;

        // Draw basic map shapes (Grid lines)
        ctx.strokeStyle = 'rgba(123, 108, 255, 0.05)';
        ctx.lineWidth = 1;
        for(let i=0; i<W; i+=40) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,H); ctx.stroke(); }
        for(let i=0; i<H; i+=40) { ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(W,i); ctx.stroke(); }

        // Draw Nodes
        REGIONS.forEach(r => {
            const x = r.x * W, y = r.y * H;
            const pulse = Math.sin(t * 2 + r.x * 10) * 0.2 + 1;
            
            ctx.beginPath();
            ctx.arc(x, y, r.r * pulse, 0, Math.PI * 2);
            ctx.fillStyle = r.c;
            ctx.globalAlpha = 0.1;
            ctx.fill();
            
            ctx.beginPath();
            ctx.arc(x, y, 4, 0, Math.PI * 2);
            ctx.globalAlpha = 0.8;
            ctx.fill();
        });
        requestAnimationFrame(draw);
    }

    canvas.addEventListener('click', (e) => {
        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left, my = e.clientY - rect.top;
        REGIONS.forEach(r => {
            if (Math.hypot(mx - r.x*W, my - r.y*H) < 30) {
                const found = COUNTRIES.find(c => c.code === r.code);
                if (found) updateSidebar(found);
            }
        });
    });

    window.addEventListener('resize', resize);
    resize();
    requestAnimationFrame(draw);
}

function initReveal() {
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('in');
            }
        });
    }, { threshold: 0.1 });

    document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
}

document.addEventListener('DOMContentLoaded', loadData);
</script>

</body>
</html>
