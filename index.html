<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resonance Signal | Intelligence Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #080810; --surface: #0e0e1a; --surface2: #13131f;
            --border: rgba(255,255,255,0.06); --border-bright: rgba(255,255,255,0.12);
            --text: #e8e6f0; --text-2: #7a7890; --text-3: #3a3850;
            --accent: #7b6cff; --accent-2: #ff6b6b; --accent-3: #4ecdc4; --accent-4: #ffd93d; --accent-5: #6bcb77;
            --hot: #ff6b6b; --warm: #ffd93d; --cool: #4ecdc4; --cold: #7b6cff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }
        body { font-family: 'Syne', sans-serif; background: var(--bg); color: var(--text); overflow-x: hidden; min-height: 100vh; }
        
        /* Scanline Overlay */
        body::after { content: ''; position: fixed; inset: 0; background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0,0,0,0.03) 3px, rgba(0,0,0,0.03) 4px); pointer-events: none; z-index: 9000; }

        nav { position: fixed; top: 0; left: 0; right: 0; z-index: 8000; display: flex; align-items: center; justify-content: space-between; padding: 16px 40px; background: rgba(8,8,16,0.85); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); }
        .nav-logo { display: flex; align-items: center; gap: 10px; }
        .logo-text { font-size: 0.95rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text); }
        .logo-text span { color: var(--accent); }
        .nav-status { display: flex; align-items: center; gap: 6px; font-family: 'DM Mono', monospace; font-size: 0.65rem; color: var(--text-2); }
        .live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent-5); animation: livepulse 2s ease-in-out infinite; }
        @keyframes livepulse { 0%,100% { opacity: 1; box-shadow: 0 0 0 0 rgba(107,203,119,0.4); } 50% { opacity: 0.7; box-shadow: 0 0 0 4px rgba(107,203,119,0); } }

        .hero { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 120px 40px 80px; position: relative; overflow: hidden; text-align: center; }
        .hero-grid { position: absolute; inset: 0; background-image: linear-gradient(rgba(123,108,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(123,108,255,0.03) 1px, transparent 1px); background-size: 80px 80px; }
        .hero-title { font-size: clamp(3rem, 8vw, 6.5rem); font-weight: 800; line-height: 0.92; margin-bottom: 28px; }
        .hero-title .line-2 { color: transparent; -webkit-text-stroke: 1px rgba(123,108,255,0.4); display: block; }
        
        .hero-stats { display: flex; gap: 40px; justify-content: center; flex-wrap: wrap; margin-top: 48px; }
        .hero-stat-num { font-size: 2rem; font-weight: 800; color: var(--text); }
        .hero-stat-label { font-family: 'DM Mono', monospace; font-size: 0.6rem; color: var(--text-3); text-transform: uppercase; }

        section { padding: 100px 40px; }
        .section-inner { max-width: 1100px; margin: 0 auto; }
        
        /* Map Styles */
        .map-layout { display: grid; grid-template-columns: 1fr 320px; gap: 32px; }
        .map-container { position: relative; border: 1px solid var(--border); border-radius: 12px; background: var(--bg); overflow: hidden; }
        #world-map { width: 100%; height: 400px; cursor: crosshair; }
        .map-tooltip { position: absolute; background: var(--surface2); border: 1px solid var(--border-bright); padding: 8px 12px; font-family: 'DM Mono', monospace; font-size: 0.62rem; display: none; pointer-events: none; z-index: 100; }

        /* Data Visualization Components */
        .gap-row { display: grid; grid-template-columns: 1fr 100px 100px 120px; padding: 12px 20px; border-bottom: 1px solid var(--border); }
        .signal-pill { font-family: 'DM Mono', monospace; font-size: 0.6rem; padding: 3px 10px; border-radius: 20px; }
        .signal-pill.underground { background: rgba(123,108,255,0.1); color: var(--accent); }
        
        .velocity-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .velocity-card { background: var(--surface); padding: 24px; border: 1px solid var(--border); border-radius: 8px; }
        
        /* Reveal Animations */
        .reveal { opacity: 0; transform: translateY(20px); transition: all 0.6s ease-out; }
        .reveal.in { opacity: 1; transform: translateY(0); }

        footer { padding: 40px; border-top: 1px solid var(--border); font-family: 'DM Mono', monospace; font-size: 0.6rem; color: var(--text-3); text-align: center; }
    </style>
</head>
<body>

<nav>
    <div class="nav-logo">
        <span class="logo-text">RESONANCE <span>SIGNAL</span></span>
    </div>
    <div class="nav-status"><div class="live-dot"></div> LIVE · 2026 INTELLIGENCE</div>
</nav>

<div class="hero">
    <div class="hero-grid"></div>
    <div class="hero-eyebrow">Electronic Music Intelligence</div>
    <h1 class="hero-title">
        <span class="line-1">WHERE MUSIC</span>
        <span class="line-2">MOVES BEFORE</span>
        <span class="line-3">IT CHARTS</span>
    </h1>
    <div class="hero-stats">
        <div class="hero-stat">
            <div class="hero-stat-num" id="stat-artists">0</div>
            <div class="hero-stat-label">Artists Indexed</div>
        </div>
        <div class="hero-stat">
            <div class="hero-stat-num">10</div>
            <div class="hero-stat-label">Global Markets</div>
        </div>
    </div>
</div>

<section id="map-section">
    <div class="section-inner">
        <h2 style="margin-bottom: 40px;">Global Signal Heat</h2>
        <div class="map-layout">
            <div class="map-container">
                <canvas id="world-map"></canvas>
                <div class="map-tooltip" id="map-tooltip"></div>
            </div>
            <div class="map-sidebar">
                <div class="velocity-card">
                    <div id="sel-country" style="font-size: 1.2rem; font-weight: 800;">Select a Market</div>
                    <div id="sel-country-sub" style="font-family:'DM Mono'; font-size: 0.6rem; color: var(--text-3); margin-bottom: 20px;">Click map to inspect</div>
                    <div id="sel-genre-bars"></div>
                </div>
            </div>
        </div>
    </div>
</section>

<section id="gap-section">
    <div class="section-inner">
        <h2 style="margin-bottom: 20px;">The Artist Gap</h2>
        <div id="gap-rows" style="background: var(--surface); border-radius: 12px; border: 1px solid var(--border);"></div>
    </div>
</section>

<section id="velocity-section">
    <div class="section-inner">
        <h2 style="margin-bottom: 20px;">Genre Velocity</h2>
        <div class="velocity-grid" id="velocity-grid"></div>
    </div>
</section>

<footer>RESONANCE SIGNAL · DATA: BEATPORT & LAST.FM · 2026</footer>

<script>
    const SIGNAL_LABELS = { aligned: 'Aligned', 'dj-play': 'DJ-led', 'fan-buy': 'Fan-driven', underground: 'Underground' };
    let GAP_DATA = [], VELOCITY_DATA = [], GEO_DATA = [], EMERGING_DATA = [], COUNTRIES = [];
    
    // Canvas & Map Logic
    const canvas = document.getElementById('world-map');
    const ctx = canvas.getContext('2d');
    const tooltip = document.getElementById('map-tooltip');
    let W, H, dpr, hoveredCountry = null, animFrame;

    const REGIONS = [
        {name:'North America', code:'US', x:0.16, y:0.32, r:30, c:'#ffd93d'},
        {name:'Germany', code:'DE', x:0.505, y:0.29, r:18, c:'#ff6b6b'},
        {name:'UK', code:'GB', x:0.455, y:0.26, r:14, c:'#ffd93d'},
        {name:'Netherlands', code:'NL', x:0.49, y:0.28, r:11, c:'#ff6b6b'},
        {name:'South Africa', code:'ZA', x:0.545, y:0.74, r:16, c:'#7b6cff'},
        {name:'Australia', code:'AU', x:0.835, y:0.68, r:22, c:'#ffd93d'}
    ];

    async function loadData() {
        try {
            // Using relative paths to ensure local and server compatibility
            const base = 'data/'; 
            const fetchJson = (file) => fetch(base + file).then(r => r.ok ? r.json() : []);

            const [gap, vel, geo, em, countries] = await Promise.all([
                fetchJson('gap.json'), fetchJson('velocity.json'),
                fetchJson('geo.json'), fetchJson('emerging.json'),
                fetchJson('countries.json')
            ]);

            GAP_DATA = gap; VELOCITY_DATA = vel; GEO_DATA = geo; EMERGING_DATA = em; COUNTRIES = countries;

            renderUI();
            initMap();
        } catch (e) {
            console.error("Resonance Load Error:", e);
        }
    }

    function renderUI() {
        document.getElementById('stat-artists').textContent = GAP_DATA.length;

        // Render Gap Table
        document.getElementById('gap-rows').innerHTML = GAP_DATA.map(r => `
            <div class="gap-row">
                <div><div style="font-weight:700">${r.artist}</div><div style="font-size:0.6rem; color:var(--text-3)">${r.genre}</div></div>
                <div style="font-family:'DM Mono'">#${r.playRank || '--'}</div>
                <div style="font-family:'DM Mono'">#${r.buyRank || '--'}</div>
                <div><span class="signal-pill ${r.signal}">${SIGNAL_LABELS[r.signal]}</span></div>
            </div>
        `).join('');

        // Render Velocity
        document.getElementById('velocity-grid').innerHTML = VELOCITY_DATA.map(v => `
            <div class="velocity-card">
                <div style="font-size:0.6rem; color:var(--accent)">${v.status.toUpperCase()}</div>
                <div style="font-size:1.1rem; font-weight:800; margin-bottom:10px;">${v.genre}</div>
                <div style="font-family:'DM Mono'; font-size:0.7rem;">${v.delta}</div>
            </div>
        `).join('');
    }

    function initMap() {
        W = canvas.offsetWidth; H = canvas.offsetHeight;
        dpr = window.devicePixelRatio || 1;
        canvas.width = W * dpr; canvas.height = H * dpr;
        ctx.scale(dpr, dpr);
        requestAnimationFrame(drawMap);
    }

    function drawMap(ts) {
        ctx.clearRect(0, 0, W, H);
        const t = ts / 1000;

        REGIONS.forEach(r => {
            const x = r.x * W; const y = r.y * H;
            const pulse = Math.sin(t * 2) * 0.2 + 0.8;
            
            ctx.beginPath();
            ctx.arc(x, y, r.r * pulse, 0, Math.PI * 2);
            ctx.fillStyle = r.c;
            ctx.globalAlpha = 0.15;
            ctx.fill();

            ctx.beginPath();
            ctx.arc(x, y, 4, 0, Math.PI * 2);
            ctx.globalAlpha = 0.8;
            ctx.fill();
            
            ctx.font = "10px DM Mono";
            ctx.textAlign = "center";
            ctx.fillText(r.code, x, y + 15);
        });
        ctx.globalAlpha = 1;
        animFrame = requestAnimationFrame(drawMap);
    }

    function updateSidebar(code) {
        const country = COUNTRIES.find(c => c.code === code);
        if (!country) return;
        document.getElementById('sel-country').textContent = country.name;
        document.getElementById('sel-country-sub').textContent = `${country.sets} sets logged`;
        document.getElementById('sel-genre-bars').innerHTML = country.genres.map(g => `
            <div style="margin-bottom:8px">
                <div style="display:flex; justify-content:space-between; font-size:0.7rem"><span>${g.n}</span><span>${g.v}%</span></div>
                <div style="height:2px; background:var(--border); width:100%"><div style="height:100%; background:var(--accent); width:${g.v}%"></div></div>
            </div>
        `).join('');
    }

    canvas.addEventListener('click', e => {
        const rect = canvas.getBoundingClientRect();
        const mx = e.clientX - rect.left; const my = e.clientY - rect.top;
        REGIONS.forEach(r => {
            const dx = mx - (r.x * W); const dy = my - (r.y * H);
            if (Math.hypot(dx, dy) < 30) updateSidebar(r.code);
        });
    });

    loadData();
</script>
</body>
</html>
