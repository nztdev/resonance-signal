<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resonance Signal</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">

<style>
/* KEEPING YOUR ORIGINAL CSS UNCHANGED */
:root{--bg:#080810;--surface:#0e0e1a;--surface2:#13131f;--border:rgba(255,255,255,0.06);--border-bright:rgba(255,255,255,0.12);--text:#e8e6f0;--text-2:#7a7890;--text-3:#3a3850;--accent:#7b6cff;--accent-2:#ff6b6b;--accent-3:#4ecdc4;--accent-4:#ffd93d;--accent-5:#6bcb77}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text)}
section{padding:60px 20px}
</style>
</head>

<body>

<h1 style="text-align:center;padding:40px 20px;">Resonance Signal</h1>

<section>
<h2>Signal Gap</h2>
<div id="gap-rows"></div>
</section>

<section>
<h2>Velocity</h2>
<div id="velocity-grid"></div>
</section>

<section>
<h2>Geo</h2>
<div id="geo-grid"></div>
</section>

<section>
<h2>Emerging</h2>
<table border="1" width="100%">
<tbody id="emerging-tbody"></tbody>
</table>
</section>

<script>
const SIGNAL_LABELS = {
  aligned:'Aligned',
  'dj-play':'DJ-led',
  'fan-buy':'Fan-driven',
  underground:'Underground'
};

let GAP_DATA = [];
let VELOCITY_DATA = [];
let GEO_DATA = [];
let EMERGING_DATA = [];
let COUNTRIES = [];

/* ---------------- RENDER ---------------- */

function renderGap(){
  const el = document.getElementById('gap-rows');
  if(!el) return;

  el.innerHTML = GAP_DATA.map(r => `
    <div>
      ${r.artist} (${r.genre}) | 
      Play: ${r.playRank || '—'} | 
      Buy: ${r.buyRank || '—'} | 
      ${SIGNAL_LABELS[r.signal]}
    </div>
  `).join('');
}

function renderVelocity(){
  const el = document.getElementById('velocity-grid');
  if(!el) return;

  el.innerHTML = VELOCITY_DATA.map(v => `
    <div>
      ${v.genre} | ${v.status} |
      DJ ${v.playPct}% / Commercial ${v.buyPct}%
    </div>
  `).join('');
}

function renderGeo(){
  const el = document.getElementById('geo-grid');
  if(!el) return;

  el.innerHTML = GEO_DATA.map(g => `
    <div>
      ${g.country} ${g.flag}
    </div>
  `).join('');
}

function renderEmerging(){
  const el = document.getElementById('emerging-tbody');
  if(!el) return;

  el.innerHTML = EMERGING_DATA.map(t => `
    <tr>
      <td>${t.title}</td>
      <td>${t.artist}</td>
      <td>${t.label}</td>
      <td>${t.plays}</td>
      <td>${Math.round(t.heat*100)}</td>
      <td>${t.market}</td>
    </tr>
  `).join('');
}

function updateSidebar(country){
  const el = document.getElementById('sel-country');
  if(!el || !country) return;
  el.textContent = country.name;
}

/* ---------------- DATA LOAD ---------------- */

async function loadData(){
  try{
    const base = './data/';

    const [gap, vel, geo, em, countries] = await Promise.all([
      fetch(base + 'gap.json').then(r => {
        if(!r.ok) throw new Error('gap.json missing');
        return r.json();
      }),
      fetch(base + 'velocity.json').then(r => r.json()),
      fetch(base + 'geo.json').then(r => r.json()),
      fetch(base + 'emerging.json').then(r => r.json()),
      fetch(base + 'countries.json').then(r => r.json())
    ]);

    GAP_DATA = gap;
    VELOCITY_DATA = vel;
    GEO_DATA = geo;
    EMERGING_DATA = em;
    COUNTRIES = countries;

    renderGap();
    renderVelocity();
    renderGeo();
    renderEmerging();

    if(COUNTRIES.length){
      updateSidebar(COUNTRIES[0]);
    }

  }catch(e){
    console.error('DATA LOAD ERROR:', e);
    document.body.innerHTML += `<p style="color:red">Data failed to load</p>`;
  }
}

/* ---------------- INIT ---------------- */

if(document.readyState === 'loading'){
  document.addEventListener('DOMContentLoaded', loadData);
}else{
  loadData();
}
</script>

</body>
</html>
